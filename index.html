<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tools Platform - Tooba Urooj</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f9f7ff;
transition:0.3s;
}

.dark{
background:#1e1b2e;
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#7c3aed;
color:white;
}

nav button{
background:white;
color:#7c3aed;
border:none;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

header{
text-align:center;
padding:40px;
}

.categories{
text-align:center;
margin:20px;
}

.categories button{
margin:5px;
padding:8px 15px;
border:none;
border-radius:20px;
background:#ddd;
cursor:pointer;
}

.categories button:hover{
background:#7c3aed;
color:white;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
transition:0.3s;
position:relative;
}

.dark .card{
background:#2d2a44;
}

.card:hover{
transform:translateY(-8px);
}

.logo{
width:60px;
height:60px;
object-fit:contain;
}

.favorite{
position:absolute;
top:10px;
right:15px;
cursor:pointer;
font-size:20px;
}

.star{
cursor:pointer;
color:gray;
}

.star.active{
color:gold;
}

.toast{
position:fixed;
bottom:20px;
right:20px;
background:#7c3aed;
color:white;
padding:10px 20px;
border-radius:20px;
display:none;
}

footer{
text-align:center;
padding:20px;
background:#7c3aed;
color:white;
margin-top:40px;
}
</style>
</head>

<body>

<nav>
<h3>AI Tools Platform</h3>
<button onclick="toggleMode()">🌙 Toggle Mode</button>
</nav>

<header>
<h2>Tooba Urooj | SU73-BSAIM-F24-018</h2>
<p>BSAI – Programming for AI – Assessment 4</p>
<p>Total Tools: <span id="count"></span></p>
</header>

<div class="categories">
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('text')">Text</button>
<button onclick="filterCategory('image')">Image</button>
<button onclick="filterCategory('coding')">Coding</button>
</div>

<div class="container" id="toolsContainer"></div>

<div class="toast" id="toast">Added to Favorites!</div>

<footer>
© 2026 Tooba Urooj
</footer>

<script>

const tools=[
{name:"ChatGPT",url:"https://chat.openai.com",logo:"https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg",cat:"text"},
{name:"Midjourney",url:"https://www.midjourney.com",logo:"https://seeklogo.com/images/M/midjourney-logo-AB4F1C6E64-seeklogo.com.png",cat:"image"},
{name:"GitHub Copilot",url:"https://github.com/features/copilot",logo:"https://seeklogo.com/images/G/github-copilot-logo-1B88B1D3B2-seeklogo.com.png",cat:"coding"}
];

const container=document.getElementById("toolsContainer");
const count=document.getElementById("count");
const toast=document.getElementById("toast");

function displayTools(list){
container.innerHTML="";
list.forEach(tool=>{
container.innerHTML+=`
<div class="card">
<span class="favorite" onclick="addFavorite('${tool.name}')">♡</span>
<img src="${tool.logo}" class="logo">
<h3 onclick="window.open('${tool.url}','_blank')" style="cursor:pointer;">${tool.name}</h3>

<div>
<span class="star" onclick="rate(this)">★</span>
<span class="star" onclick="rate(this)">★</span>
<span class="star" onclick="rate(this)">★</span>
<span class="star" onclick="rate(this)">★</span>
<span class="star" onclick="rate(this)">★</span>
</div>

</div>`;
});
count.innerText=list.length;
}

displayTools(tools);

function filterCategory(cat){
if(cat==="all") displayTools(tools);
else{
let filtered=tools.filter(t=>t.cat===cat);
displayTools(filtered);
}
}

function toggleMode(){
document.body.classList.toggle("dark");
}

function addFavorite(name){
localStorage.setItem(name,"favorite");
toast.style.display="block";
setTimeout(()=>toast.style.display="none",2000);
}

function rate(star){
star.classList.toggle("active");
}

</script>

</body>
</html>
