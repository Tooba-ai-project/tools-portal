<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tools Portal - Tooba Urooj</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

header{
text-align:center;
padding:30px;
background:rgba(0,0,0,0.4);
}

h1,h2,p{margin:5px;}

.controls{
text-align:center;
padding:20px;
}

input,select{
padding:10px;
border-radius:8px;
border:none;
margin:5px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
background:rgba(255,255,255,0.2);
}

.card i{
font-size:35px;
margin-bottom:10px;
}

footer{
text-align:center;
padding:20px;
background:rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<header>
<h1>AI Tools Portal</h1>
<h2>Tooba Urooj</h2>
<p>Roll No: SU73-BSAIM-F24-018</p>
<p>Department: BSAI - 4th Semester</p>
<p>Course: Programming for AI</p>
<p><strong>Assessment 4 – 50 AI Tools</strong></p>
</header>

<div class="controls">
<input type="text" id="search" placeholder="Search AI Tool..." onkeyup="searchTool()">
<select id="category" onchange="filterCategory()">
<option value="all">All Categories</option>
<option value="text">Text AI</option>
<option value="image">Image AI</option>
<option value="video">Video AI</option>
<option value="coding">Coding AI</option>
<option value="productivity">Productivity AI</option>
</select>
</div>

<div class="container" id="toolsContainer"></div>

<footer>
© 2026 Tooba Urooj | Programming for AI
</footer>

{name:"Replika",url:"https://replika.com",icon:"fa-heart",desc:"AI companion chatbot.",cat:"text"},
{name:"ElevenLabs",url:"https://elevenlabs.io",icon:"fa-microphone",desc:"AI voice generation tool.",cat:"video"},
{name:"DeepAI",url:"https://deepai.org",icon:"fa-network-wired",desc:"AI tools and APIs platform.",cat:"image"},

{name:"Remove.bg",url:"https://remove.bg",icon:"fa-scissors",desc:"AI background remover.",cat:"image"},

{name:"Soundraw",url:"https://soundraw.io",icon:"fa-music",desc:"AI music generator.",cat:"video"},
{name:"Predis AI",url:"https://predis.ai",icon:"fa-share-nodes",desc:"AI social media creator.",cat:"productivity"},
{name:"Magisto",url:"https://www.magisto.com",icon:"fa-camera-retro",desc:"AI video editing tool.",cat:"video"}
];

const container = document.getElementById("toolsContainer");

function displayTools(list){
container.innerHTML="";
list.forEach(tool=>{
container.innerHTML+=`
<div class="card" onclick="window.open('${tool.url}','_blank')" data-cat="${tool.cat}">
<i class="fa-solid ${tool.icon}"></i>
<h3>${tool.name}</h3>
<p>${tool.desc}</p>
</div>`;
});
}

displayTools(tools);

function searchTool(){
let input=document.getElementById("search").value.toLowerCase();
let filtered=tools.filter(t=>t.name.toLowerCase().includes(input));
displayTools(filtered);
}

function filterCategory(){
let cat=document.getElementById("category").value;
if(cat==="all"){displayTools(tools);}
else{
let filtered=tools.filter(t=>t.cat===cat);
displayTools(filtered);
}
}

</script>
</body>
</html>
