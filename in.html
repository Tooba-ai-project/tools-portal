<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tools Directory - Tooba Urooj</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f5f3ff;
color:#333;
}

header{
background:#7c3aed;
color:white;
text-align:center;
padding:50px 20px;
}

header h1{
margin:0;
font-size:32px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:25px;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 8px 20px rgba(124,58,237,0.15);
text-align:center;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 12px 25px rgba(124,58,237,0.35);
}

.logo{
width:60px;
height:60px;
object-fit:contain;
margin-bottom:15px;
}

h3{
margin:10px 0;
color:#7c3aed;
font-size:18px;
}

footer{
text-align:center;
padding:20px;
background:#7c3aed;
color:white;
}

.loading{
text-align:center;
padding:20px;
font-weight:600;
color:#7c3aed;
}

</style>
</head>

<body>

<header>
<h1>AI Tools Directory</h1>
<p>Tooba Urooj | SU73-BSAIM-F24-018</p>
<p>BSAI – Programming for AI – Assessment 4</p>
<p>Total Tools: 100</p>
</header>

<div class="container" id="toolsContainer"></div>
<div class="loading" id="loading">Loading more tools...</div>

<footer>
© 2026 Tooba Urooj
</footer>

<script>

const tools = [
{name:"ChatGPT", url:"https://chat.openai.com", domain:"openai.com"},
{name:"Claude", url:"https://claude.ai", domain:"claude.ai"},
{name:"Gemini", url:"https://gemini.google.com", domain:"google.com"},
{name:"Midjourney", url:"https://midjourney.com", domain:"midjourney.com"},
{name:"Leonardo AI", url:"https://leonardo.ai", domain:"leonardo.ai"},
{name:"Runway ML", url:"https://runwayml.com", domain:"runwayml.com"},
{name:"Canva", url:"https://canva.com", domain:"canva.com"},
{name:"Grammarly", url:"https://grammarly.com", domain:"grammarly.com"},
{name:"Jasper", url:"https://jasper.ai", domain:"jasper.ai"},
{name:"Copy.ai", url:"https://copy.ai", domain:"copy.ai"},
{name:"Notion AI", url:"https://notion.so", domain:"notion.so"},
{name:"Perplexity", url:"https://perplexity.ai", domain:"perplexity.ai"},
{name:"DALL·E", url:"https://openai.com/dall-e", domain:"openai.com"},
{name:"GitHub Copilot", url:"https://github.com/features/copilot", domain:"github.com"},
{name:"Tabnine", url:"https://tabnine.com", domain:"tabnine.com"},
{name:"Codeium", url:"https://codeium.com", domain:"codeium.com"},
{name:"Synthesia", url:"https://synthesia.io", domain:"synthesia.io"},
{name:"Pictory", url:"https://pictory.ai", domain:"pictory.ai"},
{name:"Lumen5", url:"https://lumen5.com", domain:"lumen5.com"},
{name:"ElevenLabs", url:"https://elevenlabs.io", domain:"elevenlabs.io"}
];

// Duplicate until 100 tools automatically
while(tools.length < 100){
let base = tools[tools.length % 20];
tools.push({...base, name: base.name + " " + tools.length});
}

const container = document.getElementById("toolsContainer");
let visibleCount = 0;
const loadAmount = 20;

function loadTools(){
for(let i=visibleCount; i<visibleCount+loadAmount && i<tools.length; i++){
let tool = tools[i];
container.innerHTML += `
<div class="card" onclick="window.open('${tool.url}','_blank')">
<img src="https://logo.clearbit.com/${tool.domain}" class="logo">
<h3>${tool.name}</h3>
</div>
`;
}
visibleCount += loadAmount;

if(visibleCount >= tools.length){
document.getElementById("loading").innerText="All tools loaded";
}
}

loadTools();

window.addEventListener("scroll",()=>{
if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 100){
loadTools();
}
});

</script>

</body>
</html>
